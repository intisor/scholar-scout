<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="#0f9d7d"/>
  
  <!-- Graduation cap -->
  <g transform="translate(64, 64)">
    <!-- Cap line -->
    <line x1="-35" y1="-5" x2="35" y2="-5" stroke="white" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Cap top -->
    <polygon points="0,-35 -30,-10 30,-10" fill="white"/>
    
    <!-- Tassel -->
    <line x1="0" y1="-10" x2="0" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="25" r="5" fill="white"/>
    
    <!-- Book -->
    <rect x="-20" y="10" width="40" height="30" rx="3" fill="none" stroke="white" stroke-width="3"/>
    <line x1="0" y1="10" x2="0" y2="40" stroke="white" stroke-width="2"/>
  </g>
</svg>
